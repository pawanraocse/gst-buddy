spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    hikari:
      maximum-pool-size: 50

  jpa:
    show-sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      file-size-threshold: 1MB
      resolve-lazily: true

server:
  port: 8082

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:backend-service}
    prefer-ip-address: false

  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka}

management:
  tracing:
    sampling:
      probability: 0.1

# Disable Swagger UI in production
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: INFO
    com.learning.backendservice: INFO
    org.hibernate.SQL: WARN

  file:
    name: /var/log/backend-service/backend-service.log

# Production retention — longer than default 7 days
app:
  retention:
    days: ${APP_RETENTION_DAYS:30}

