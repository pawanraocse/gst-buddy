<div class="app-shell-container">
  <!-- Desktop Sidebar -->
  <app-sidebar 
    class="hidden lg:block"
    [collapsed]="sidebarCollapsed()" 
    (toggle)="toggleSidebar()">
  </app-sidebar>

  <!-- Mobile Sidebar (Overlay) -->
  <div class="mobile-sidebar-overlay" [class.active]="mobileSidebarActive()" (click)="closeMobileSidebar()"></div>
  <app-sidebar 
    class="mobile-sidebar"
    [class.active]="mobileSidebarActive()"
    [collapsed]="false"
    (toggle)="closeMobileSidebar()">
  </app-sidebar>

  <main class="app-main-content" 
        [style.padding-left]="sidebarCollapsed() ? 'var(--sidebar-collapsed-width)' : 'var(--sidebar-width)'">
    <app-topbar (toggleMobileSidebar)="toggleMobileSidebar()"></app-topbar>
    
    <div class="content-canvas">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
