<div class="sidebar-wrapper" [class.collapsed]="collapsed">
  <div class="sidebar-header">
    <div class="logo-container" routerLink="/">
      <i class="pi pi-shield logo-icon"></i>
      <span class="logo-text" *ngIf="!collapsed">GSTbuddies</span>
    </div>
    <button class="toggle-btn" (click)="onToggle()" [pTooltip]="collapsed ? 'Expand' : 'Collapse'" tooltipPosition="right">
      <i class="pi" [class.pi-angle-double-right]="collapsed" [class.pi-angle-double-left]="!collapsed"></i>
    </button>
  </div>

  <div class="sidebar-content">
    <ul class="nav-list">
      <li *ngFor="let item of navItems()" class="nav-item-wrapper">
        <a [routerLink]="item.link" 
           routerLinkActive="active" 
           class="nav-item" 
           pRipple
           [pTooltip]="collapsed ? item.label : ''" 
           tooltipPosition="right">
          <i [class]="item.icon"></i>
          <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
          <p-badge *ngIf="!collapsed && item.badge" [value]="item.badge" severity="info" class="nav-badge"></p-badge>
        </a>
      </li>
    </ul>

    <p-divider *ngIf="!collapsed" class="mx-3 my-2"></p-divider>

    <div class="new-audit-section" [class.px-3]="!collapsed">
      <button pButton 
              [label]="collapsed ? '' : 'New Audit'" 
              icon="pi pi-plus" 
              class="p-button-primary w-full glow-on-hover"
              routerLink="/app/audit/upload"
              [pTooltip]="collapsed ? 'New Audit' : ''"
              tooltipPosition="right">
      </button>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="user-brief" *ngIf="!collapsed">
      <div class="avatar-circle">
        {{ authService.currentUser()?.email?.substring(0, 1)?.toUpperCase() }}
      </div>
      <div class="user-info">
        <span class="user-name">My Workspace</span>
        <span class="user-plan">Pro Plan</span>
      </div>
    </div>
    
    <div class="credit-chip-wrapper" [class.collapsed-chip]="collapsed">
       <p-chip icon="pi pi-bolt" label="12" class="credits-chip" pTooltip="Remaining Credits" tooltipPosition="right"></p-chip>
    </div>
  </div>
</div>
